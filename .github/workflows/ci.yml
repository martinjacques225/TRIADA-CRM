name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax check (all JS modules)
        run: |
          find . -name '*.js' -not -path './node_modules/*' -print0 \
            | xargs -0 -I{} node --check {}

      - name: Unit tests
        run: npm test
