<!DOCTYPE html>
<html lang="es" data-theme="light" data-density="comfortable">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Tríada CRM — Gestión de diagnósticos empresariales 360">
  <meta name="theme-color" content="#0C7C88">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Tríada Diagnóstico CRM">
  <title>Tríada · Diagnóstico CRM</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./modules/home/home.css">
  <link rel="stylesheet" href="./modules/pipeline/pipeline.css">
  <link rel="stylesheet" href="./modules/diagnosticos/diagnosticos.css">
  <link rel="stylesheet" href="./modules/agenda/agenda.css">
  <link rel="stylesheet" href="./modules/propuestas/propuestas.css">
  <link rel="stylesheet" href="./modules/informes/informes.css">
  <link rel="stylesheet" href="./modules/informe-ejecutivo/informe.css">
  <link rel="stylesheet" href="./modules/configuracion/configuracion.css">
  <link rel="stylesheet" href="./modules/facturacion/facturacion.css">
  <link rel="stylesheet" href="./modules/ai-commander/ai-commander.css">
</head>
<body>

<div id="app">
  <nav id="nav"></nav>
  <div id="main">
    <div id="topbar">
      <button class="btn-icon" id="menuToggle" style="display:none" title="Menú" aria-label="Abrir menú">
        <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20" aria-hidden="true"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
      </button>
      <div id="topbarTitle" class="topbar-title">Tríada CRM</div>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>
    <div id="content">
      <main id="center"></main>
    </div>
  </div>
</div>

<!-- MODAL GLOBAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-head">
      <h3 id="modalTitle">Modal</h3>
      <button class="modal-close" id="modalClose" aria-label="Cerrar" title="Cerrar">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="modalCancel">Cancelar</button>
      <button class="btn btn-primary" id="modalSave">Guardar</button>
    </div>
  </div>
</div>

<!-- Biblioteca de íconos de línea (window.icon) — debe cargar antes del módulo -->
<script src="./js/icons.js"></script>
<!-- Expose navigate globally for inline onclick -->
<script type="module" src="./app.js"></script>
<script>
  // Allow inline onclick="navigate(...)" before module loads
  window.navigate = function(v) { window._app?.navigate(v); };
  window.closeModal = function() { document.getElementById('modalOverlay').classList.remove('open'); };

  // Mobile nav toggle
  document.addEventListener('DOMContentLoaded', () => {
    const toggle = document.getElementById('menuToggle');
    const nav    = document.getElementById('nav');
    if (window.innerWidth <= 900) toggle.style.display = '';
    window.addEventListener('resize', () => {
      toggle.style.display = window.innerWidth <= 900 ? '' : 'none';
      if (window.innerWidth > 900) nav.classList.remove('open');
    });
    toggle.addEventListener('click', () => nav.classList.toggle('open'));
    // close nav on main click (mobile)
    document.getElementById('main').addEventListener('click', () => {
      if (window.innerWidth <= 900) nav.classList.remove('open');
    });
  });
</script>
</body>
</html>
